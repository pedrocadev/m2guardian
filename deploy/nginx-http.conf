# ─────────────────────────────────────────────────────────────────────────────
# M2 Guardian — Nginx (HTTP apenas, sem SSL ainda)
# Copiar para: /etc/nginx/sites-available/m2guardian
# Depois: ln -sf /etc/nginx/sites-available/m2guardian /etc/nginx/sites-enabled/
# E:      nginx -t && systemctl reload nginx
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;

    # Aceita acesso por IP enquanto domínio não está apontado
    # Quando tiver domínio, troque _ por: m2guardian.com.br www.m2guardian.com.br
    server_name _;

    root /var/www/m2guardian/public;
    index index.php;

    # Tamanho máximo de upload
    client_max_body_size 32M;

    # Logs
    access_log /var/log/nginx/m2guardian-access.log;
    error_log  /var/log/nginx/m2guardian-error.log;

    # Headers de seguranca sao adicionados pelo middleware Laravel SecurityHeaders.
    # Manter aqui causa duplicacao no response. So mantemos os que Laravel nao cobre:
    # (nenhum agora — HSTS, CSP, Permissions-Policy ficam no middleware)

    # Não servir arquivos sensíveis
    location ~ /\.(?!well-known) {
        deny all;
    }
    location ~ /(storage|bootstrap|database|tests|deploy|config|app|routes)/ {
        deny all;
    }

    # Rotas Laravel
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_read_timeout 120;
    }

    # Assets estáticos: cache longo
    # try_files ESSENCIAL — Livewire/Filament servem JS/CSS via rotas dinamicas
    # (ex: /livewire/livewire.js nao existe no disco, eh gerado pelo Laravel)
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff2?|ttf|svg)$ {
        try_files $uri /index.php?$query_string;
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # Bloquear acesso direto a logs
    location ~* /(laravel\.log|\.env)$ {
        deny all;
    }
}
