# ─────────────────────────────────────────────────────────────────────────────
# M2 Guardian — Nginx HTTPS (depois de ter domínio + Certbot)
# Esta é a config que o Certbot vai modificar automaticamente.
# Pode usar este arquivo COMO REFERÊNCIA do estado final.
#
# Fluxo:
# 1) Aponta o domínio para o IP (registro A no provedor de DNS)
# 2) Aguarda propagação (~5-30 min): nslookup SEU.DOMINIO.com
# 3) Roda: certbot --nginx -d SEU.DOMINIO.com -d www.SEU.DOMINIO.com
# 4) Certbot edita o nginx-http.conf adicionando SSL automaticamente
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name m2guardian.com.br www.m2guardian.com.br;

    # Força redirect para HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name m2guardian.com.br www.m2guardian.com.br;

    # SSL — Certbot preenche estes caminhos
    ssl_certificate /etc/letsencrypt/live/m2guardian.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/m2guardian.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/m2guardian/public;
    index index.php;

    client_max_body_size 32M;

    access_log /var/log/nginx/m2guardian-access.log;
    error_log  /var/log/nginx/m2guardian-error.log;

    # Headers de segurança (HSTS só com HTTPS funcionando)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location ~ /\.(?!well-known) {
        deny all;
    }
    location ~ /(storage|bootstrap|database|tests|deploy|config|app|routes)/ {
        deny all;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTPS on;
        include fastcgi_params;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_read_timeout 120;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff2?|ttf|svg)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }
}
