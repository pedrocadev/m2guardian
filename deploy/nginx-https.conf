# ─────────────────────────────────────────────────────────────────────────────
# M2 Guardian — Nginx HTTPS (depois de ter domínio + Certbot)
#
# Domínio canônico: m2guardiao.com.br
# Subdomínio legacy: guardiao.m2cloud.com.br (transição — manter até 60d após cutover)
#
# Fluxo de setup (one-time):
# 1) DNS aponta m2guardiao.com.br e www.m2guardiao.com.br → IP da VM
# 2) Aguarda propagação: nslookup m2guardiao.com.br
# 3) Roda: certbot --nginx -d m2guardiao.com.br -d www.m2guardiao.com.br
# 4) Certbot preenche os paths SSL automaticamente
# ─────────────────────────────────────────────────────────────────────────────

# === HTTP → HTTPS (todos os hosts) ===
server {
    listen 80;
    listen [::]:80;
    server_name m2guardiao.com.br www.m2guardiao.com.br guardiao.m2cloud.com.br;

    return 301 https://$host$request_uri;
}

# === www.m2guardiao.com.br → m2guardiao.com.br (canonical sem www) ===
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.m2guardiao.com.br;

    ssl_certificate /etc/letsencrypt/live/m2guardiao.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/m2guardiao.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://m2guardiao.com.br$request_uri;
}

# === APP principal — m2guardiao.com.br (canônico) ===
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name m2guardiao.com.br;

    ssl_certificate /etc/letsencrypt/live/m2guardiao.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/m2guardiao.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/m2guardian/public;
    index index.php;

    client_max_body_size 32M;

    access_log /var/log/nginx/m2guardian-access.log;
    error_log  /var/log/nginx/m2guardian-error.log;

    # Headers de segurança vêm do middleware Laravel SecurityHeaders.

    location ~ /\.(?!well-known) {
        deny all;
    }
    location ~ /(storage|bootstrap|database|tests|deploy|config|app|routes)/ {
        deny all;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTPS on;
        include fastcgi_params;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_read_timeout 120;
    }

    # Assets estáticos: cache longo
    # try_files essencial — Livewire/Filament servem JS/CSS via rotas dinâmicas
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff2?|ttf|svg)$ {
        try_files $uri /index.php?$query_string;
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }
}

# ─────────────────────────────────────────────────────────────────────────────
# === LEGACY — guardiao.m2cloud.com.br (período de transição) ===
#
# REMOVER ESTE BLOCO APÓS 60 DIAS DO CUTOVER (data: ver commit do nginx).
# Por enquanto continua servindo a aplicação no domínio antigo pra não quebrar
# links em e-mails, bookmarks, etc. Depois trocar este bloco por:
#
#     server {
#         listen 443 ssl http2;
#         server_name guardiao.m2cloud.com.br;
#         [cert legacy aqui]
#         return 301 https://m2guardiao.com.br$request_uri;
#     }
#
# E eventualmente remover por completo (incluindo o cert no certbot).
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name guardiao.m2cloud.com.br;

    ssl_certificate /etc/letsencrypt/live/guardiao.m2cloud.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/guardiao.m2cloud.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/m2guardian/public;
    index index.php;

    client_max_body_size 32M;

    access_log /var/log/nginx/m2guardian-legacy-access.log;
    error_log  /var/log/nginx/m2guardian-legacy-error.log;

    location ~ /\.(?!well-known) { deny all; }
    location ~ /(storage|bootstrap|database|tests|deploy|config|app|routes)/ { deny all; }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTPS on;
        include fastcgi_params;
        fastcgi_read_timeout 120;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff2?|ttf|svg)$ {
        try_files $uri /index.php?$query_string;
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }
}
